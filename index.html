<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OAD_MAP2</title>

  <!-- Leaflet（地図ライブラリ） -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- GA4　Google Analitcs イベント送信 (※ID該当部分のみ修正要) -->
  <script async
          src="https://www.googletagmanager.com/gtag/js?id=G-YGD8E8JZJM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-YGD8E8JZJM'); //右側はIDを入れるところ
  </script>

 <!-- CSS画面レイアウト -->
  <style>
    /* 画面全体を地図に */
    html, body, #map { height:100%; margin:0; }
    #map { z-index:0; }

    /* カテゴリパネル */
    .panel{
      position:fixed;
      top:12px;
      left:12px;
      background:#0f1730;
      color:#fff;
      padding:12px 14px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      z-index:1000;
      min-width:220px;
      font-family:system-ui,sans-serif;
    }

    .panel h3{
      margin:0 0 8px;
      font-size:14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    /* チェックボックス1行 */
    .item{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
      margin:6px 0;
    }

    .item input{ width:16px; height:16px; }

    /* カテゴリ色ドット */
    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
    }

    /* カテゴリ開閉 */
    #categoryList.hidden{ display:none; }

    /* Leafletデフォルトピンを消す */
    .leaflet-div-icon.custom-pin{
      background:none;
      border:none;
    }

    /* ポップアップ */
    .popup{ max-width:160px; }
    .popup-thumb{
      width:100%;
      height:180px;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:6px;
    }
    .popup-body h4{
      font-size:14px;
      margin:4px 0;
    }
    .popup-body p{
      font-size:12px;
      line-height:1.7;
      margin:0 0 8px;
    }
  </style>
</head>

<body>

<!-- 地図表示領域 -->
<div id="map"></div>

<!-- カテゴリ選択パネル -->
<div class="panel">
  <h3>
    <span>
      カテゴリ
      <!-- 未選択時のヒント表示 -->
      <span id="categoryHint"
            style="font-size:12px;opacity:.7;margin-left:6px;">
        選択してください
      </span>
    </span>
    <!-- カテゴリ開閉ボタン -->
    <button id="toggleCategory"
            style="background:none;border:none;color:white;
                   font-size:18px;cursor:pointer;">
      －
    </button>
  </h3>
  <!-- カテゴリ一覧（JSで生成） -->
  <div id="categoryList"></div>
</div>

<script>
/* ===== 設定 ===== */
const BASE_PATH = "/OAD_MAP";
const withBasePath = p => BASE_PATH + "/" + p;

/* ===== Map ===== */
const map = L.map("map").setView([34.6937, 135.5023], 12);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "© OpenStreetMap contributors"
}).addTo(map);

/* ===== GA ===== */
// イベント送信ラッパー(※修正しない)
function track(evt){
  if(typeof gtag === "function"){
    gtag("event", evt.type, evt);
  }
}

/* ===== SVGピン ===== */
function createPinIcon(color){
  return L.divIcon({
    className:"custom-pin",
    html:`
      <svg width="26" height="40" viewBox="0 0 24 36">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24
                 C24 5.4 18.6 0 12 0z"
              fill="${color}"/>
        <circle cx="12" cy="12" r="5" fill="white"/>
      </svg>
    `,
    iconSize:[26,40],
    iconAnchor:[13,40],
    popupAnchor:[0,-34]
  });
}

/* ===== Init ===== */
(async () => {

  const data = await fetch(withBasePath("pois.json")).then(r => r.json());
  const categories = data.categories;
  const pois = data.pois;

  /* --- カテゴリ別レイヤー --- */
  const layers = {};
  categories.forEach(c => {
    layers[c.category_id] = L.layerGroup();
  });

  /* --- ピン生成 --- */
  pois.forEach(p => {
    const catId = p.category.category_id;
    if(!layers[catId]) return;

    const marker = L.marker(
      [p.spot.latitude, p.spot.longitude],
      { icon: createPinIcon(p.category.color_code) }
    )
    .bindPopup(`
      <div class="popup">
        ${p.thumbnail_url ? `
          <img src="${p.thumbnail_url}"
               class="popup-thumb"
               alt="${p.event_name}">
        ` : ""}
        <div class="popup-body">
          <h4>${p.event_name}</h4>
          <p>${p.description || ""}</p>
          <a href="${p.detail_url}" target="_blank">詳細を見る</a>
        </div>
      </div>
    `)
    .addTo(layers[catId]);

    // ピンクリック時ログ(※修正しない)
    marker.on("click", () => {
      track({
        type:"poi_click",
        event_id:p.event_id,
        event_name:p.event_name,
        category_id:catId,
        category_name:p.category.category_name
      });
    });
  });

/* --- カテゴリUI（初期全選択・排他制御） --- */
  const wrap = document.getElementById("categoryList");
  const hint = document.getElementById("categoryHint");
  if (hint) hint.style.display = "none"; // 初期全表示のためヒント非表示

  // 1. 全表示レイヤーを初期状態でMapに追加
  Object.values(layers).forEach(layer => map.addLayer(layer));

  // 2. 「すべて」項目の作成
  const allRow = document.createElement("label");
  allRow.className = "item";
  allRow.innerHTML = `
    <input type="checkbox" id="check-all" checked>
    <span class="dot" style="border:1px solid #fff; background:transparent; display:flex; align-items:center; justify-content:center;">
      <span style="width:6px; height:6px; background:#fff; border-radius:50%;"></span>
    </span>
    <span>すべて</span>
  `;
  const allCheck = allRow.querySelector("input");
  wrap.appendChild(allRow);

  const catChecks = []; // 個別チェックボックスの参照保持用

  // 3. 個別カテゴリ項目の生成
  categories.forEach(c => {
    const row = document.createElement("label");
    row.className = "item";
    row.innerHTML = `
      <input type="checkbox" class="cat-check" data-id="${c.category_id}">
      <span class="dot" style="background:${c.color_code}"></span>
      <span>${c.category_name}</span>
    `;
    const checkbox = row.querySelector("input");
    catChecks.push(checkbox);
    wrap.appendChild(row);

    // 【個別選択時の挙動】
    checkbox.addEventListener("change", () => {
      if (checkbox.checked) {
        // 個別が選ばれたら「すべて」を解除
        if (allCheck.checked) {
          allCheck.checked = false;
          // 「すべて」から「個別」に切り替わった瞬間、一旦全レイヤーを消す
          Object.values(layers).forEach(l => map.removeLayer(l));
        }
        map.addLayer(layers[c.category_id]);
      } else {
        map.removeLayer(layers[c.category_id]);
        // 全て外れたら「すべて」にチェックを戻す（任意）
        if (!catChecks.some(cb => cb.checked)) {
          allCheck.checked = true;
          Object.values(layers).forEach(l => map.addLayer(l));
        }
      }
      track({ type: "category_toggle", category_id: c.category_id, checked: checkbox.checked });
    });
  });

  // 【「すべて」選択時の挙動】
  allCheck.addEventListener("change", () => {
    if (allCheck.checked) {
      // 個別チェックをすべて解除
      catChecks.forEach(cb => cb.checked = false);
      // 全レイヤーを表示
      Object.values(layers).forEach(l => map.addLayer(l));
      track({ type: "category_select_all" });
    } else {
      // 「すべて」が外されたら、便宜上全レイヤーを削除
      Object.values(layers).forEach(l => map.removeLayer(l));
    }
  });

  /* --- カテゴリ開閉 --- */
  const toggleBtn = document.getElementById("toggleCategory");
  let open = true;

  toggleBtn.addEventListener("click", () => {
    open = !open;
    wrap.classList.toggle("hidden", !open);
    toggleBtn.textContent = open ? "－" : "＋";
  });

})();
</script>

</body>
</html>
